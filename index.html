function estTime(f,p){
  const wt=p.mode==="reps"?(p.reps||10)*3:(p.workTime||30);const rt=p.restTime||10;
  switch(f.id){
    case"circuit":return Math.round((p.rounds*(p.exercises*(wt+rt)+(p.roundRest||60)))/60);
    case"stations":return Math.round((p.stations*((p.laps||2)*p.exPerStn*(wt+rt)+(p.stnRest||45)))/60);
    case"tabata":return Math.round(((p.tabSets||1)*(p.exercises*(p.tabRounds||8)*((p.workTime||20)+(p.restTime||10))+(p.setRest||60)))/60);
    case"amrap":return p.duration;
    case"supersets":return Math.round((p.pairs*(p.rounds*p.exPerPair*(wt+rt)+(p.pairRest||60)))/60);
    case"emom":return p.duration;
    case"buyin":return Math.round(((p.buyIn||20)*3+p.rounds*p.exercises*(wt+rt)+(p.buyOut||20)*3)/60);
    default:return 20;
  }
}

function wPick(a,n){
  if(a.length<=n)return[...a];
  const now=Date.now();
  const scored=a.map(e=>{
    let rec=0;
    if(e.lastUsed){const days=(now-new Date(e.lastUsed).getTime())/86400000;rec=Math.min(2,days/14);}
    else rec=1.5;
    return{...e,_s:(e.rating||3)*0.8+rec*0.2+Math.random()*0.5};
  }).sort((a,b)=>b._s-a._s);
  const pool=scored.slice(0,Math.min(n*3,scored.length));
  const s=[],u=new Set();let i=0;
  while(s.length<n&&i<2000){const p=pool[Math.floor(Math.random()*pool.length)];if(!u.has(p.id)){s.push(p);u.add(p.id);}i++;}
  return s;
}

function smartSel(ex,sess,tot,hist=[]){
  const recentIds=new Set();hist.slice(0,3).forEach(h=>(h.exercises||[]).forEach(e=>recentIds.add(e.id)));
  const prefer=ex.map(e=>recentIds.has(e.id)?{...e,rating:Math.max(1,e.rating-1)}:e);
  const pk=(c,s,n)=>wPick(prefer.filter(e=>e.category===c&&e.subcategory===s),n);
  let s=[];
  if(sess==="lower"){
    const a=Math.ceil(tot*.28),b=Math.ceil(tot*.28),c=Math.max(1,Math.floor(tot*.08)),d=Math.max(1,Math.floor(tot*.22));
    const lBase=[...pk("Lower Body","Push (Squats/Lunges)",a),...pk("Lower Body","Pull (Hinge/Deadlift)",b),...pk("Lower Body","Calves",c),...pk("Lower Body","Cardio/Plyometric",d),...wPick(prefer.filter(e=>e.category==="Core"),Math.max(1,tot-a-b-c-d))];
    const lC=lBase.filter(e=>e.type==="cardio").length;const lTarget=Math.ceil(tot/2);
    if(lC<lTarget){const lIds=new Set(lBase.map(e=>e.id));const lPool=prefer.filter(e=>e.type==="cardio"&&!lIds.has(e.id)&&(e.category==="Lower Body"||e.category==="Core"));const lAdd=wPick(lPool,Math.min(lTarget-lC,2));lBase.splice(lBase.length-lAdd.length,lAdd.length,...lAdd);}
    s=lBase;
  } else if(sess==="upper"){
    const ch=Math.max(1,Math.ceil(tot*.18)),bk=Math.max(1,Math.ceil(tot*.18)),sh=Math.max(1,Math.ceil(tot*.14)),bi=Math.max(1,Math.floor(tot*.1)),tr=Math.max(1,Math.floor(tot*.1)),cd=Math.max(1,Math.floor(tot*.15));
    s=[...pk("Upper Body","Chest",ch),...pk("Upper Body","Back",bk),...pk("Upper Body","Shoulders",sh),...pk("Upper Body","Biceps",bi),...pk("Upper Body","Triceps",tr),...pk("Upper Body","Cardio/Compound",cd),...wPick(prefer.filter(e=>e.category==="Core"),Math.max(1,tot-ch-bk-sh-bi-tr-cd))];
  } else {
    const half=Math.floor(tot/2);
    const base=[...pk("Lower Body","Push (Squats/Lunges)",1),...pk("Lower Body","Pull (Hinge/Deadlift)",1),...pk("Lower Body","Cardio/Plyometric",1),...wPick(prefer.filter(e=>["Chest","Shoulders","Triceps"].includes(e.subcategory)&&e.type==="resistance"),1),...wPick(prefer.filter(e=>["Back","Biceps"].includes(e.subcategory)&&e.type==="resistance"),1),...pk("Upper Body","Cardio/Compound",1),...wPick(prefer.filter(e=>e.category==="Core"),Math.max(1,Math.floor(tot*0.12)))];
    const baseIds=new Set(base.map(e=>e.id));const remaining=tot-base.length;
    if(remaining>0){
      let cc=base.filter(e=>e.type==="cardio").length;const needC=Math.max(0,half-cc);
      const usedEq=new Set(base.flatMap(e=>e.equipment));
      const avC=prefer.filter(e=>e.type==="cardio"&&!baseIds.has(e.id)).sort((a,b)=>b.equipment.filter(eq=>usedEq.has(eq)).length-a.equipment.filter(eq=>usedEq.has(eq)).length);
      const avR=prefer.filter(e=>e.type==="resistance"&&!baseIds.has(e.id)).sort((a,b)=>b.equipment.filter(eq=>usedEq.has(eq)).length-a.equipment.filter(eq=>usedEq.has(eq)).length);
      const curC=base.filter(e=>e.type==="cardio").length;const target=Math.ceil(tot/2);
      const needMore=Math.max(0,target-curC);
      base.push(...wPick(avC,Math.min(needMore,remaining)),...wPick(avR,Math.max(0,remaining-Math.min(needMore,remaining))));
    }
    s=base;
  }
  const uniq=[],ids=new Set();for(const e of s)if(!ids.has(e.id)){uniq.push(e);ids.add(e.id);}
  const ord=[],rem=[...uniq],rec=[];
  while(rem.length){
    let best=rem.find(e=>!rec.slice(-2).includes(e.subcategory)&&(ord.length===0||ord[ord.length-1].type!==e.type));
    if(!best)best=rem.find(e=>!rec.slice(-2).includes(e.subcategory));
    if(!best)best=rem[0];
    rem.splice(rem.indexOf(best),1);ord.push(best);rec.push(best.subcategory);
  }
  return ord.slice(0,tot);
}

const gymSort=(exs,zones)=>{
  const zm={};zones.forEach(z=>zm[z.id]=z.order);
  return[...exs].sort((a,b)=>(zm[a.zone]||99)-(zm[b.zone]||99)||(a.zoneOrder||0)-(b.zoneOrder||0));
};

// Equipment clash detection
const detectClashes=(exs)=>{
  const single=new Set(["Rower","SkiErg","Sled","Log"]);
  const used={};const clashes=[];
  exs.forEach(e=>e.equipment.forEach(eq=>{if(single.has(eq)){if(used[eq])clashes.push({eq,ex1:used[eq],ex2:e.name});else used[eq]=e.name;}}));
  return clashes;
};

// Format avoidance from recent history
const pickFormat=(formats,hist)=>{
  const recentFmts=new Set(hist.slice(0,2).map(h=>h.fmt?.id).filter(Boolean));
  const wf=formats.flatMap(f=>{const w=f.rating||3;const penalty=recentFmts.has(f.id)?1:w;return Array(Math.max(1,penalty)).fill(f);});
  return wf[Math.floor(Math.random()*wf.length)];
};

    {history.length===0&&<div style={{color:T.textDim,fontSize:12,padding:30,textAlign:"center"}}>No saved workouts yet. Generate a workout and tap ⭐ Save to keep it here.</div>}
    {history.map((h,i)=><div key={i} style={{...S.card,padding:"10px 12px"}}>
      <div style={{fontSize:12,fontWeight:700,color:T.white}}>{h.session==="lower"?"🦵 Lower":h.session==="upper"?"💪 Upper":"🏋️ Full"} — {h.fmt?.name||"?"}</div>
      <div style={{fontSize:9,color:T.textMuted,fontFamily:mono}}>{h.date} · ~{h.time}m</div>
      <div style={{fontSize:9,color:T.textDim,marginTop:3}}>{(h.exercises||[]).map(e=>e.name).join(" → ")}</div>
      {h.notes&&<div style={{fontSize:9,color:T.text,marginTop:4,fontStyle:"italic",padding:"4px 6px",background:T.surface,borderRadius:4}}>📝 {h.notes}</div>}
      <div style={{display:"flex",gap:4,marginTop:6}}>
        <button className="th-btn" onClick={()=>{copyToClip(buildCopyText(h)).then(()=>showToast("Copied"));}} style={{...S.btn("ghost"),padding:"4px 10px",fontSize:10}}>📋 Copy</button>
        <button className="th-btn" onClick={()=>{setWorkout(h);setWoNotes(h.notes||"");setTab("generate");setGenMode("single");setControlsOpen(false);}} style={{...S.btn("ghost"),padding:"4px 10px",fontSize:10}}>Load</button>
        {confirmDel===("h"+i)?<div style={{display:"flex",gap:3}}><button className="th-btn" onClick={()=>{setHistory(history.filter((_,j)=>j!==i));setConfirmDel(null);}} style={{...S.btn("danger"),padding:"3px 8px",fontSize:9}}>Delete</button><button className="th-btn" onClick={()=>setConfirmDel(null)} style={{...S.btn("ghost"),padding:"3px 8px",fontSize:9}}>No</button></div>:<button className="th-btn" onClick={()=>setConfirmDel("h"+i)} style={{background:"none",border:"none",cursor:"pointer",color:T.textDim,fontSize:10,padding:3}}>×</button>}
      </div>
    </div>)}
    {history.length>0&&<button className="th-btn" onClick={()=>{if(window.confirm("Clear all saved workouts?"))setHistory([]);}} style={{...S.btn("danger"),width:"100%",justifyContent:"center",marginTop:8,fontSize:10}}>Clear All</button>}
  </div>);
  const tabs=[{id:"generate",l:"⚡ Generator"},{id:"formats",l:"📋 Formats"},{id:"warmfin",l:"🎯 Warmups"},{id:"exercises",l:"🏋️ Exercises"},{id:"saved",l:"⭐ Saved"},{id:"settings",l:"⚙️ Settings"}];
  const touchRef=useRef({x:0,y:0});
  const handleTouchStart=(e)=>{touchRef.current={x:e.touches[0].clientX,y:e.touches[0].clientY};};
  const handleTouchEnd=(e)=>{const dx=e.changedTouches[0].clientX-touchRef.current.x;const dy=e.changedTouches[0].clientY-touchRef.current.y;if(Math.abs(dx)>80&&Math.abs(dx)>Math.abs(dy)*1.5){const tabIds=tabs.map(t=>t.id);const ci=tabIds.indexOf(tab);if(dx<0&&ci<tabIds.length-1)setTab(tabIds[ci+1]);if(dx>0&&ci>0)setTab(tabIds[ci-1]);}};
  return <div style={{fontFamily:font,background:T.bg,minHeight:"100vh",color:T.text}}>

    {toast&&<div className="th-toast">{toast}</div>}
    
    <div className="th-header" style={{background:`linear-gradient(135deg,${T.surface},${T.bg})`,padding:"14px 20px",borderBottom:`1px solid ${T.border}`}}>
      <div style={{display:"flex",alignItems:"center",gap:14,maxWidth:960,margin:"0 auto"}}>
        <span className="th-header-title" style={{fontSize:20,fontWeight:800,color:T.white,letterSpacing:".04em"}}>TRANSFORM HUB</span>
        <span className="th-header-sub" style={{fontSize:10,color:T.textMuted,fontWeight:700,letterSpacing:".1em",textTransform:"uppercase",borderLeft:`1px solid ${T.border}`,paddingLeft:14}}>Workout Builder</span>
        <button className="th-btn" onClick={()=>setTab("saved")} style={{...S.btn("ghost"),padding:"6px 10px",fontSize:11,marginLeft:"auto"}}>⭐ Saved {history.length>0&&<span style={{...S.badge(T.blue),marginLeft:2}}>{history.length}</span>}</button>
      </div>
    </div>
    <div className="th-top-tabs" style={{background:T.surface,borderBottom:`1px solid ${T.border}`,position:"sticky",top:0,zIndex:10}}><div style={{display:"flex",maxWidth:960,margin:"0 auto",overflow:"auto"}}>{tabs.map(t=><button key={t.id} onClick={()=>setTab(t.id)} style={{padding:"11px 18px",fontSize:12,fontWeight:tab===t.id?700:500,fontFamily:font,color:tab===t.id?T.blue:T.textMuted,background:"none",border:"none",cursor:"pointer",borderBottom:`2px solid ${tab===t.id?T.blue:"transparent"}`,transition:"all .15s",letterSpacing:".02em",whiteSpace:"nowrap"}}>{t.l}</button>)}</div></div>
    <div style={{maxWidth:960,margin:"0 auto",padding:"14px 20px",paddingBottom:70}}>{tab==="generate"&&genTab()}{tab==="formats"&&fmtTab()}{tab==="exercises"&&exTab()}{tab==="warmfin"&&wfTab()}{tab==="saved"&&savedTab()}{tab==="settings"&&settingsTab()}</div>
    <div className="th-bottom-nav" style={{position:"fixed",bottom:0,left:0,right:0,background:T.bg,borderTop:`1px solid ${T.border}`,zIndex:50}}>
      <div style={{display:"flex",width:"100%",gap:4,padding:"8px 12px max(8px, env(safe-area-inset-bottom))"}}>
        {[{id:"generate",icon:"⚡",label:"Generate"},{id:"formats",icon:"📋",label:"Formats"},{id:"warmfin",icon:"🎯",label:"Warmups"},{id:"exercises",icon:"🏋️",label:"Exercises"},{id:"settings",icon:"⚙️",label:"Settings"}].map(t=>
          <button key={t.id} onClick={()=>setTab(t.id)} style={{flex:1,padding:"10px 12px 8px",background:tab===t.id?T.blueGlow:"none",border:tab===t.id?`1px solid ${T.blue}44`:"1px solid transparent",borderRadius:12,cursor:"pointer",color:tab===t.id?T.blue:T.textMuted,fontFamily:font,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:3,transition:"all .15s",minHeight:54}}>
            <span style={{fontSize:20,lineHeight:1}}>{t.icon}</span>
            <span style={{fontSize:10,fontWeight:tab===t.id?700:400}}>{t.label}</span>
          </button>
        )}
      </div>
    </div>
  </div>;
}

</script>
