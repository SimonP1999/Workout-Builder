// Warmup tags for session-aware selection
const WU_TAGS={w1:"cardio",w2:"cardio",w3:"cardio",w4:"cardio",w5:"cardio",w6:"cardio",w7:"cardio",w8:"cardio",w9:"full",w10:"explosive",w11:"mobility",w12:"cardio"};
const WU_SESSION_FIT={lower:["mobility","full","cardio"],upper:["cardio","full","explosive"],full:["cardio","full","explosive"]};

const ensureTracking=(arr)=>arr.map(x=>({usedCount:0,lastUsed:null,...x}));

function estTime(f,p){
  const wt=p.mode==="reps"?(p.reps||10)*3:(p.workTime||30);const rt=p.restTime||10;
  switch(f.id){
    case"circuit":return Math.round((p.rounds*(p.exercises*(wt+rt)+(p.roundRest||60)))/60);
    case"stations":return Math.round((p.stations*((p.laps||2)*p.exPerStn*(wt+rt)+(p.stnRest||45)))/60);
    case"tabata":return Math.round(((p.tabSets||1)*(p.exercises*(p.tabRounds||8)*((p.workTime||20)+(p.restTime||10))+(p.setRest||60)))/60);
    case"amrap":return p.duration;
    case"supersets":return Math.round((p.pairs*(p.rounds*p.exPerPair*(wt+rt)+(p.pairRest||60)))/60);
    case"emom":return p.duration;
    case"buyin":return Math.round(((p.buyIn||20)*3+p.rounds*p.exercises*(wt+rt)+(p.buyOut||20)*3)/60);
    default:return 20;
  }
}

function wPick(a,n){
  if(a.length<=n)return[...a];
  const now=Date.now();
  const scored=a.map(e=>{
    let rec=1;
    if(e.lastUsed){const days=(now-new Date(e.lastUsed).getTime())/86400000;rec=Math.min(1.5,0.5+days/14);}
    const r=e.rating||3;
    return{...e,_w:Math.pow(r,2.5)*rec};
  });
  // Weighted random selection without replacement
  const s=[],rem=[...scored];
  while(s.length<n&&rem.length>0){
    const total=rem.reduce((t,e)=>t+e._w,0);
    let r=Math.random()*total;
    let pick=rem[rem.length-1];
    for(let i=0;i<rem.length;i++){r-=rem[i]._w;if(r<=0){pick=rem[i];rem.splice(i,1);break;}}
    s.push(pick);
  }
  return s;
}

function smartSel(ex,sess,tot,hist=[],equipMaxCounts=null,recentGenerated=null){
  // Penalise recently used exercises
  const recentIds=new Set();hist.slice(0,3).forEach(h=>(h.exercises||[]).forEach(e=>recentIds.add(e.id)));
  // Also penalise recently generated (unsaved) exercises
  if(recentGenerated)recentGenerated.forEach(id=>recentIds.add(id));
  const prefer=ex.map(e=>recentIds.has(e.id)?{...e,rating:Math.max(1,e.rating-1)}:e);
  const pk=(pool,n)=>wPick(pool,n);
  const byCS=(c,s)=>prefer.filter(e=>e.category===c&&e.subcategory===s);

  // ── SLOT SYSTEM ──
  // Define required subcategory slots per session type
  // Each slot: [category, subcategory, count, required]
  let slots=[];
  if(sess==="lower"){
    const lp=Math.ceil(tot*0.25),lh=Math.ceil(tot*0.25),lc=Math.ceil(tot*0.25),cal=1,cor=Math.max(1,Math.floor(tot*0.1));
    const lSlots=[["Lower Body","Push (Squats/Lunges)",lp],["Lower Body","Pull (Hinge/Deadlift)",lh],["Lower Body","Cardio/Plyometric",lc],["Lower Body","Calves",cal],["Core",null,cor]];
    // Cap: reduce largest slots if total exceeds tot
    let lTotal=lp+lh+lc+cal+cor;
    if(lTotal>tot){const over=lTotal-tot;lSlots[0][2]=Math.max(1,lp-Math.ceil(over/2));lSlots[1][2]=Math.max(1,lh-Math.floor(over/2));}
    slots=lSlots;
  } else if(sess==="upper"){
    const uSlots=[
      ["Upper Body","Chest",Math.max(1,Math.ceil(tot*0.18))],
      ["Upper Body","Back",Math.max(1,Math.ceil(tot*0.18))],
      ["Upper Body","Shoulders",Math.max(1,Math.ceil(tot*0.14))],
      ["Upper Body","Biceps",1],
      ["Upper Body","Triceps",1],
      ["Upper Body","Cardio/Compound",Math.max(1,Math.floor(tot*0.15))],
      ["Core",null,Math.max(1,Math.floor(tot*0.1))]
    ];
    // Cap: drop optional slots if over budget
    let uTotal=uSlots.reduce((s,x)=>s+x[2],0);
    while(uTotal>tot&&uSlots.length>4){uTotal-=uSlots.pop()[2];}
    slots=uSlots;
  } else {
    // Full body: guarantee major patterns but leave room for fill-remaining
    const fbSlots=[
      ["Lower Body","Push (Squats/Lunges)",1],
      ["Lower Body","Pull (Hinge/Deadlift)",1],
      ["Lower Body","Cardio/Plyometric",1],
      ["Upper Body","Chest",1],
      ["Upper Body","Back",1],
      ["Upper Body","Cardio/Compound",1],
      ["Core",null,1]
    ];
    // Only use as many slots as leaves at least 1 remaining for variety
    slots=tot<=6?fbSlots.slice(0,Math.max(4,tot-1)):fbSlots;
  }

  // Fill slots (respecting equipment max counts)
  const picked=[];const usedIds=new Set();const eqUsed={};
  const canPick=(e)=>{
    if(!equipMaxCounts)return true;
    for(const eq of e.equipment){
      const max=equipMaxCounts[eq];
      if(max&&max>0&&(eqUsed[eq]||0)>=max)return false;
    }
    return true;
  };
  const trackPick=(e)=>{e.equipment.forEach(eq=>{eqUsed[eq]=(eqUsed[eq]||0)+1;});};
  
  for(const [cat,sub,n] of slots){
    const pool=sub?byCS(cat,sub):prefer.filter(e=>e.category===cat);
    const avail=pool.filter(e=>!usedIds.has(e.id)&&canPick(e));
    const sel=pk(avail,n);
    sel.forEach(e=>{picked.push(e);usedIds.add(e.id);trackPick(e);});
  }

  // Track subcategory coverage for fill + post-selection
  const subCounts={};picked.forEach(e=>{
    subCounts[e.subcategory]=(subCounts[e.subcategory]||0)+1;
    if(e.secondary)subCounts[e.secondary]=(subCounts[e.secondary]||0)+0.5;
  });

  // Fill remaining with balanced selection (subcategory + equipment)
  let remaining=tot-picked.length;
  if(remaining>0){
    // Reset subCounts with current picks
    Object.keys(subCounts).forEach(k=>delete subCounts[k]);
    picked.forEach(e=>{
      subCounts[e.subcategory]=(subCounts[e.subcategory]||0)+1;
      if(e.secondary)subCounts[e.secondary]=(subCounts[e.secondary]||0)+0.5;
    });
    const eqCounts={};picked.forEach(e=>e.equipment.forEach(eq=>{eqCounts[eq]=(eqCounts[eq]||0)+1;}));
    
    const avail=prefer.filter(e=>!usedIds.has(e.id)&&canPick(e)&&(
      sess==="lower"?(e.category==="Lower Body"||e.category==="Core"||e.category==="Full Body"):
      sess==="upper"?(e.category==="Upper Body"||e.category==="Core"||e.category==="Full Body"):true
    ));
    
    // Score each candidate by: underrepresented subcategory + underrepresented equipment + rating
    while(remaining>0&&avail.length>0){
      let bestIdx=0;let bestScore=-999;
      for(let i=0;i<avail.length;i++){
        const e=avail[i];
        let score=Math.pow(e.rating||3,1.5);
        // Prefer underrepresented subcategories (primary strong, secondary mild)
        score-=(subCounts[e.subcategory]||0)*2;
        if(e.secondary)score+=(subCounts[e.secondary]||0)<1?1.5:0;
        // Prefer underrepresented equipment — balanced against rating
        const maxEq=Math.max(...e.equipment.map(eq=>eqCounts[eq]||0),0);
        score-=maxEq*2;
        score+=Math.random()*2;
        if(score>bestScore){bestScore=score;bestIdx=i;}
      }
      const pick=avail.splice(bestIdx,1)[0];
      picked.push(pick);usedIds.add(pick.id);trackPick(pick);
      subCounts[pick.subcategory]=(subCounts[pick.subcategory]||0)+1;
      if(pick.secondary)subCounts[pick.secondary]=(subCounts[pick.secondary]||0)+0.5;
      pick.equipment.forEach(eq=>{eqCounts[eq]=(eqCounts[eq]||0)+1;});
      remaining--;
    }
  }

  // Post-selection: if any equipment type has more than half the exercises, swap some out
  const eqFinal={};picked.forEach(e=>e.equipment.forEach(eq=>{eqFinal[eq]=(eqFinal[eq]||0)+1;}));
  const maxAllowed=Math.ceil(tot*0.4);
  for(const [eq,count] of Object.entries(eqFinal)){
    if(count<=maxAllowed||["Bodyweight","None"].includes(eq))continue;
    // Too many of this equipment — swap excess for alternatives
    let excess=count-maxAllowed;
    for(let i=picked.length-1;i>=0&&excess>0;i--){
      if(!picked[i].equipment.includes(eq))continue;
      const alt=prefer.filter(e=>!usedIds.has(e.id)&&!e.equipment.includes(eq)&&canPick(e)&&e.type===picked[i].type&&e.category===picked[i].category);
      if(alt.length){
        const swap=alt.sort((a,b)=>{
          let sa=(b.rating||3)-(a.rating||3);
          // Bonus if secondary muscle covers an underrepresented area
          if(b.secondary&&(subCounts[b.secondary]||0)<1)sa+=1;
          if(a.secondary&&(subCounts[a.secondary]||0)<1)sa-=1;
          return sa;
        })[Math.floor(Math.random()*Math.min(3,alt.length))];
        usedIds.delete(picked[i].id);picked[i]=swap;usedIds.add(swap.id);
        excess--;
      }
    }
  }

  // Deduplicate and return (ordering happens after all swaps)
  const uniq=[];const uids=new Set();
  for(const e of picked)if(!uids.has(e.id)){uniq.push(e);uids.add(e.id);}
  return uniq.slice(0,tot);
}

// Smart station grouping: balanced stations with mixed types, equipment, muscles
function smartStations(exs, numStations, perStation, zoneList, portable){
  const portSet=new Set(portable||[]);
  const sorted=[...(zoneList||[])].sort((a,b)=>a.order-b.order);
  
  if(!sorted.length)return exs;
  
  // ── MERGE ZONES INTO STATION GROUPS ──
  // If 4 zones and 3 stations, merge two adjacent zones into one station
  // If 3 zones and 3 stations, 1:1 mapping
  // If 2 zones and 3 stations, split the larger zone across two stations
  let stationZones=[];
  if(sorted.length<=numStations){
    // More stations than zones — each zone gets a station, extras get mixed
    stationZones=sorted.map(z=>({zones:[z],equipment:new Set(z.equipment||[])}));
    while(stationZones.length<numStations){
      // Add extra stations that can use any portable equipment
      stationZones.push({zones:[],equipment:new Set()});
    }
  } else {
    // More zones than stations — merge adjacent zones
    // Distribute zones as evenly as possible across stations
    const perStn=Math.ceil(sorted.length/numStations);
    for(let i=0;i<numStations;i++){
      const start=Math.floor(i*sorted.length/numStations);
      const end=Math.floor((i+1)*sorted.length/numStations);
      const merged=sorted.slice(start,end);
      const allEq=new Set(merged.flatMap(z=>z.equipment||[]));
      stationZones.push({zones:merged,equipment:allEq});
    }
  }
  
  // ── BUILD ZONE LOOKUP ──
  // For each exercise, find which station group best fits ALL its non-portable equipment
  const exBestStation=(e)=>{
    const nonPort=e.equipment.filter(eq=>!portSet.has(eq));
    if(nonPort.length===0)return -1; // fully portable, fits anywhere
    
    // First: find station with ALL non-portable equipment
    for(let s=0;s<stationZones.length;s++){
      const eq=stationZones[s].equipment;
      if(nonPort.every(x=>eq.has(x)))return s;
    }
    // Fallback: find station with most matches
    let bestStn=-1;let bestScore=-1;
    for(let s=0;s<stationZones.length;s++){
      const eq=stationZones[s].equipment;
      const matches=nonPort.filter(x=>eq.has(x)).length;
      if(matches>bestScore){bestScore=matches;bestStn=s;}
    }
    return bestScore>0?bestStn:-1;
  };
  
  // ── ASSIGN EXERCISES TO STATIONS ──
  const stations=Array.from({length:numStations},()=>[]);
  const rem=[...exs];
  
  // First pass: assign exercises that clearly belong to a station
  for(let i=rem.length-1;i>=0;i--){
    const best=exBestStation(rem[i]);
    if(best>=0&&stations[best].length<perStation){
      stations[best].push(rem.splice(i,1)[0]);
    }
  }
  
  // Second pass: assign remaining exercises using scoring
  let sIdx=0;
  while(rem.length>0){
    // Find the station with the fewest exercises
    let minLen=999;let minIdx=0;
    for(let s=0;s<numStations;s++){
      if(stations[s].length<minLen){minLen=stations[s].length;minIdx=s;}
    }
    if(minLen>=perStation)break; // all full
    
    const st=stations[minIdx];
    const stEq=stationZones[minIdx].equipment;
    
    let bestIdx=0;let bestScore=-999;
    for(let i=0;i<rem.length;i++){
      const e=rem[i];
      let score=0;
      
      // Zone fit — equipment matches this station's zones
      const nonPort=e.equipment.filter(eq=>!portSet.has(eq));
      const matches=nonPort.filter(eq=>stEq.has(eq)).length;
      score+=matches*4;
      if(nonPort.length===0)score+=2; // fully portable
      
      // Type balance per station
      const cardioCount=st.filter(x=>x.type==="cardio").length;
      const resCount=st.filter(x=>x.type==="resistance").length;
      if(e.type==="cardio"&&cardioCount<=resCount)score+=3;
      if(e.type==="resistance"&&resCount<=cardioCount)score+=3;
      
      // Subcategory variety
      const stSubs=st.flatMap(x=>[x.subcategory,x.secondary].filter(Boolean));
      if(!stSubs.includes(e.subcategory))score+=2;
      
      // Equipment clash within station
      const stUsedEq=new Set(st.flatMap(x=>x.equipment));
      const nonPortClash=nonPort.filter(eq=>stUsedEq.has(eq)&&!portSet.has(eq)).length;
      score-=nonPortClash*3;
      
      score+=Math.random()*1.5;
      if(score>bestScore){bestScore=score;bestIdx=i;}
    }
    
    st.push(rem.splice(bestIdx,1)[0]);
  }
  
  // CONSOLIDATION: group exercises sharing equipment into the same station
  for(let s=0;s<numStations;s++){
    const st=stations[s];
    for(let i=0;i<st.length;i++){
      const eqSet=new Set(st[i].equipment);
      // Find exercises in OTHER stations that share equipment
      for(let s2=0;s2<numStations;s2++){
        if(s2===s)continue;
        for(let j=stations[s2].length-1;j>=0;j--){
          const other=stations[s2][j];
          const shared=other.equipment.some(eq=>eqSet.has(eq));
          if(shared&&st.length<perStation&&stations[s2].length>1){
            // Move to this station
            st.push(stations[s2].splice(j,1)[0]);
          }
        }
      }
    }
  }

  // If still remaining (all stations full), append to smallest
  while(rem.length>0){
    let minLen=999;let minIdx=0;
    for(let s=0;s<numStations;s++)if(stations[s].length<minLen){minLen=stations[s].length;minIdx=s;}
    stations[minIdx].push(rem.shift());
  }
  
  // Build station names from zone names
  const stationNames=stationZones.map((sz,i)=>{
    if(sz.zones.length===0)return "Station "+(i+1);
    return sz.zones.map(z=>z.name).join(" + ");
  });
  
  return {exercises:stations.flat(), stationNames};
}

// Smart ordering: alternate types, spread subcategories and equipment
function smartOrder(exs){
  const ord=[];const rem=[...exs];
  while(rem.length){
    let best=null;let bestScore=-999;
    for(const e of rem){
      let score=0;
      if(ord.length>0&&ord[ord.length-1].type!==e.type)score+=5;
      const lastSubs=ord.slice(-2).flatMap(x=>[x.subcategory,x.secondary].filter(Boolean));
      if(!lastSubs.includes(e.subcategory))score+=4;
      if(ord.length>0){
        const lastEq=new Set(ord[ord.length-1].equipment);
        const overlap=e.equipment.filter(eq=>lastEq.has(eq)).length;
        score-=overlap*3;
      }
      score+=Math.random()*1.5;
      if(score>bestScore){bestScore=score;best=e;}
    }
    if(!best)best=rem[0];
    rem.splice(rem.indexOf(best),1);ord.push(best);
  }
  // Consolidation: pull exercises sharing equipment adjacent to each other
  for(let i=0;i<ord.length;i++){
    const eqSet=new Set(ord[i].equipment);
    for(let j=i+2;j<ord.length;j++){
      if(ord[j].equipment.some(eq=>eqSet.has(eq))){
        // Found shared equipment — pull it next to i
        const [ex]=ord.splice(j,1);
        ord.splice(i+1,0,ex);
        break; // only consolidate one per exercise
      }
    }
  }
  return ord;
}

// Post-selection: resolve equipment clashes by swapping out duplicates
const resolveClashes=(exs,allEx,singleEq,equipMaxCounts,zoneEqSet)=>{
  if(!singleEq||!singleEq.length)return exs;
  const single=new Set(singleEq);
  const result=[...exs];
  const usedSingle={};
  for(let i=0;i<result.length;i++){
    const ex=result[i];
    for(const eq of ex.equipment){
      if(single.has(eq)){
        if(usedSingle[eq]!==undefined){
          // Clash - try to swap this exercise for one that doesn't use this equipment
          const ids=new Set(result.map(e=>e.id));
          const eqCt={};result.forEach(x=>x.equipment.forEach(eq=>{eqCt[eq]=(eqCt[eq]||0)+1;}));
          const pool=allEx.filter(e=>(!zoneEqSet||e.equipment.every(eq=>zoneEqSet.has(eq)))&&!ids.has(e.id)&&e.type===ex.type&&(e.category===ex.category||e.category==="Full Body")&&!e.equipment.some(q=>single.has(q)&&usedSingle[q]!==undefined)&&e.equipment.every(eq=>{const max=(equipMaxCounts||{})[eq];return!max||max<=0||(eqCt[eq]||0)<max;}));
          if(pool.length){
            const pick=pool.sort((a,b)=>(b.rating||3)-(a.rating||3))[Math.floor(Math.random()*Math.min(3,pool.length))];
            result[i]=pick;
          }
        } else {
          usedSingle[eq]=i;
        }
      }
    }
  }
  return result;
};

// Smart superset pairing: pair push+pull or upper+lower
const supersetPair=(exs,pairSize=2)=>{
  if(pairSize!==2||exs.length<4)return exs;
  const paired=[];const rem=[...exs];
  while(rem.length>=2){
    const a=rem.shift();
    // Find best partner: different type (cardio/resistance), different subcategory, different equipment
    let bestIdx=0;let bestScore=-999;
    for(let i=0;i<rem.length;i++){
      let score=0;
      const b=rem[i];
      // Different type is ideal
      if(a.type!==b.type)score+=4;
      // Different category (upper+lower)
      if(a.category!==b.category)score+=3;
      // Different subcategory (push+pull)
      if(a.subcategory!==b.subcategory)score+=2;
      // Different equipment so they can go simultaneously
      const aEq=new Set(a.equipment);
      if(!b.equipment.some(eq=>aEq.has(eq)))score+=3;
      score+=Math.random();
      if(score>bestScore){bestScore=score;bestIdx=i;}
    }
    paired.push(a,rem.splice(bestIdx,1)[0]);
  }
  if(rem.length)paired.push(...rem);
  return paired;
};

const gymSort=(exs,zoneList,portable)=>{
    if(!zoneList||!zoneList.length)return exs;
    const sorted=[...zoneList].sort((a,b)=>a.order-b.order);
    
    // Build equipment -> zone sort key from ALL zone equipment (portable or not)
    const eqKey={};
    sorted.forEach(z=>(z.equipment||[]).forEach((eq,i)=>{
      // Only store first occurrence — if equipment is in multiple zones, use earliest zone
      if(eqKey[eq]===undefined)eqKey[eq]=z.order*100+i;
    }));
    
    const exZoneOrder=(e)=>{
      // Find the zone that has ALL non-portable equipment together
      const portSet=new Set(portable||[]);
      const nonPort=e.equipment.filter(eq=>!portSet.has(eq));
      
      if(nonPort.length>1){
        // Multi-equipment exercise: find zone with all of them
        for(const z of sorted){
          const zeq=new Set(z.equipment||[]);
          if(nonPort.every(eq=>zeq.has(eq)))return z.order*100+(z.equipment||[]).indexOf(nonPort[0]);
        }
      }
      
      // Use the earliest zone position from any of the exercise's equipment
      let best=9999;
      for(const eq of e.equipment){
        if(eqKey[eq]!==undefined&&eqKey[eq]<best)best=eqKey[eq];
      }
      return best;
    };
    
    return [...exs].sort((a,b)=>exZoneOrder(a)-exZoneOrder(b));
  }

// Equipment clash detection
const detectClashes=(exs,singleEq)=>{
  const single=new Set(singleEq||["Rower","SkiErg","Sled","Log"]);
  const used={};const clashes=[];
  exs.forEach(e=>e.equipment.forEach(eq=>{if(single.has(eq)){if(used[eq])clashes.push({eq,ex1:used[eq],ex2:e.name});else used[eq]=e.name;}}));
  return clashes;
};

// Format avoidance from recent history
const pickFormat=(formats,hist,ratings={})=>{
  const recentFmts=new Set(hist.slice(0,2).map(h=>h.fmt?.id).filter(Boolean));
  const rFmts=formats.map(f=>({...f,rating:(ratings[f.id]||{}).rating||f.rating||3}));
  const wf=rFmts.flatMap(f=>{const w=f.rating||3;const penalty=recentFmts.has(f.id)?1:w;return Array(Math.max(1,penalty)).fill(f);});
  return wf[Math.floor(Math.random()*wf.length)];
};

      <div style={{...S.card}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div><div style={{fontSize:14,fontWeight:700,color:T.white}}>👤 Coach</div><div style={{fontSize:10,color:T.textMuted,marginTop:2}}>Logged in as <span style={{color:T.blue,fontWeight:700}}>{coachName}</span></div></div>
          <button className="th-btn" onClick={()=>{const n=window.prompt("Change coach name:",coachName);if(n?.trim()){setCoachName(n.trim().toLowerCase());}}} style={S.btn("ghost")}>Change</button>
        </div>
      </div>
      <div style={{...S.card}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div><div style={{fontSize:14,fontWeight:700,color:T.white}}>🎨 Appearance</div><div style={{fontSize:10,color:T.textMuted,marginTop:2}}>Switch between light and dark mode</div></div>
          <button className="th-btn" onClick={()=>setTheme(theme==="dark"?"light":"dark")} style={{...S.btn(theme==="dark"?"ghost":"primary"),padding:"10px 20px",fontSize:13}}>{theme==="dark"?"☀️ Light Mode":"🌙 Dark Mode"}</button>
        </div>
      </div>
      <div style={{...S.card}}>
        <div onClick={()=>togSet("data")} style={{display:"flex",alignItems:"center",justifyContent:"space-between",cursor:"pointer"}}><div><div style={{fontSize:14,fontWeight:700,color:T.white}}>🗄️ Data Management</div><div style={{fontSize:10,color:T.textMuted,marginTop:2}}>Reset or clear data</div></div><Chev open={settingsOpen.data}/></div>
        {settingsOpen.data&&<div style={{marginTop:10}}>
        <div style={{display:"flex",gap:6,flexWrap:"wrap"}}><button className="th-btn" onClick={()=>{if(window.confirm("Reset exercises to defaults?")){setExercises(INIT_EX);showToast("Exercises reset");}}} style={{...S.btn("danger"),fontSize:10}}>Reset Exercises</button><button className="th-btn" onClick={()=>{if(window.confirm("Reset warmups & finishers?")){setWarmups(INIT_WU);setFinishers(INIT_FI);showToast("Reset");}}} style={{...S.btn("danger"),fontSize:10}}>Reset Warm-ups</button><button className="th-btn" onClick={()=>{if(window.confirm("Reset formats?")){setFormats(INIT_FMT);setFmtParams({});showToast("Formats reset");}}} style={{...S.btn("danger"),fontSize:10}}>Reset Formats</button><button className="th-btn" onClick={()=>{if(window.confirm("Clear ALL data? Cannot undo.")){localStorage.clear();window.location.reload();}}} style={{...S.btn("danger"),fontSize:10}}>⚠️ Factory Reset</button></div>
      </div>}
      </div>
    </div>);
  };

    // ── SAVED TAB ──
  const savedTab=()=>(<div>
    <div style={S.toolbar} className="th-toolbar"><div style={{fontSize:14,fontWeight:700,color:T.white}}>⭐ Saved Workouts</div><span style={{fontSize:10,color:T.textDim,fontFamily:mono}}>{history.length}</span></div>
    {history.length===0&&<div style={{color:T.textDim,fontSize:12,padding:30,textAlign:"center"}}>No saved workouts yet. Generate a workout and tap ⭐ Save to keep it here.</div>}
    {history.map((h,i)=><div key={i} style={{...S.card,padding:"10px 12px"}}>
      <div style={{fontSize:12,fontWeight:700,color:T.white}}>{h.session==="lower"?"🦵 Lower":h.session==="upper"?"💪 Upper":"🏋️ Full"} — {h.fmt?.name||"?"}</div>
      <div style={{fontSize:9,color:T.textMuted,fontFamily:mono}}>{h.date} · ~{h.time}m</div>
      <div style={{fontSize:9,color:T.textDim,marginTop:3}}>{(h.exercises||[]).map(e=>e.name).join(" → ")}</div>
      {h.notes&&<div style={{fontSize:9,color:T.text,marginTop:4,fontStyle:"italic",padding:"4px 6px",background:T.surface,borderRadius:4}}>📝 {h.notes}</div>}
      <div style={{display:"flex",gap:4,marginTop:6}}>
        <button className="th-btn" onClick={()=>{copyToClip(buildCopyText(h)).then(()=>showToast("Copied"));}} style={{...S.btn("ghost"),padding:"4px 10px",fontSize:10}}>📋 Copy</button>
        <button className="th-btn" onClick={()=>{setWorkout(h);setWoNotes(h.notes||"");setTab("generate");setGenMode("single");}} style={{...S.btn("ghost"),padding:"4px 10px",fontSize:10}}>Load</button>
        {confirmDel===("h"+i)?<div style={{display:"flex",gap:3}}><button className="th-btn" onClick={()=>{setHistory(history.filter((_,j)=>j!==i));setConfirmDel(null);}} style={{...S.btn("danger"),padding:"3px 8px",fontSize:9}}>Delete</button><button className="th-btn" onClick={()=>setConfirmDel(null)} style={{...S.btn("ghost"),padding:"3px 8px",fontSize:9}}>No</button></div>:<button className="th-btn" onClick={()=>setConfirmDel("h"+i)} style={{background:"none",border:"none",cursor:"pointer",color:T.textDim,fontSize:10,padding:3}}>×</button>}
      </div>
    </div>)}
    {history.length>0&&<button className="th-btn" onClick={()=>{if(window.confirm("Clear all saved workouts?"))setHistory([]);}} style={{...S.btn("danger"),width:"100%",justifyContent:"center",marginTop:8,fontSize:10}}>Clear All</button>}
  </div>);
  const tabs=[{id:"generate",l:"⚡ Generator"},{id:"formats",l:"📋 Formats"},{id:"warmfin",l:"🎯 Games"},{id:"exercises",l:"🏋️ Exercises"},{id:"settings",l:"⚙️ Settings"}];
  const touchRef=useRef({x:0,y:0});
  const handleTouchStart=(e)=>{touchRef.current={x:e.touches[0].clientX,y:e.touches[0].clientY};};
  const handleTouchEnd=(e)=>{const dx=e.changedTouches[0].clientX-touchRef.current.x;const dy=e.changedTouches[0].clientY-touchRef.current.y;if(Math.abs(dx)>80&&Math.abs(dx)>Math.abs(dy)*1.5){const tabIds=tabs.map(t=>t.id);const ci=tabIds.indexOf(tab);if(dx<0&&ci<tabIds.length-1)setTab(tabIds[ci+1]);if(dx>0&&ci>0)setTab(tabIds[ci-1]);}};
  if(!coachName) return <div style={{fontFamily:font,background:T.bg,minHeight:"100vh",color:T.text,display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>
    <div style={{...S.card,maxWidth:360,width:"100%",textAlign:"center",padding:30}}>
      <div style={{fontSize:24,marginBottom:8}}>⚡</div>
      <div style={{fontSize:20,fontWeight:800,color:T.white,marginBottom:4}}>TRANSFORM HUB</div>
      <div style={{fontSize:12,color:T.textMuted,marginBottom:20}}>Enter your name to sync your personal data across devices</div>
      <input placeholder="Your name" value={showNamePrompt||""} onChange={e=>setShowNamePrompt(e.target.value)} style={{...S.inp,textAlign:"center",fontSize:16,marginBottom:12}} className="th-input"/>
      <button className="th-btn" onClick={()=>{if(showNamePrompt?.trim()){setCoachName(showNamePrompt.trim().toLowerCase());setShowNamePrompt(false);}}} style={{...S.btn("primary"),width:"100%",justifyContent:"center",padding:14,fontSize:14}}>Get Started</button>
    </div>
  </div>;

  return <div style={{fontFamily:font,background:T.bg,minHeight:"100vh",color:T.text}}>

    {toast&&<div className="th-toast">{toast}</div>}
    
    <div className="th-header" style={{background:T.surface,padding:"10px 16px",borderBottom:`1px solid ${T.border}`}}>
      <div style={{display:"flex",alignItems:"center",gap:10,maxWidth:960,margin:"0 auto"}}>
        <span style={{fontSize:16,fontWeight:800,color:T.white,letterSpacing:".03em"}}>⚡ TRANSFORMHUB</span>
        <span className="th-header-sub" style={{fontSize:10,color:T.textMuted,fontWeight:600,letterSpacing:".08em",textTransform:"uppercase"}}>Workout Builder</span>
        <button className="th-btn" onClick={()=>setTab("saved")} style={{...S.btn("ghost"),padding:"6px 10px",fontSize:11,marginLeft:"auto"}}>⭐ {history.length||""}</button>
      </div>
    </div>
    <div className="th-top-tabs" style={{background:T.surface,borderBottom:`1px solid ${T.border}`,position:"sticky",top:0,zIndex:10}}><div style={{display:"flex",maxWidth:960,margin:"0 auto",overflow:"auto"}}>{tabs.map(t=><button key={t.id} onClick={()=>setTab(t.id)} style={{padding:"11px 18px",fontSize:12,fontWeight:tab===t.id?700:500,fontFamily:font,color:tab===t.id?T.blue:T.textMuted,background:"none",border:"none",cursor:"pointer",borderBottom:`2px solid ${tab===t.id?T.blue:"transparent"}`,transition:"all .15s",letterSpacing:".02em",whiteSpace:"nowrap"}}>{t.l}</button>)}</div></div>
    <div style={{maxWidth:960,margin:"0 auto",padding:"14px 20px",paddingBottom:70}}>{tab==="generate"&&genTab()}{tab==="formats"&&fmtTab()}{tab==="exercises"&&exTab()}{tab==="warmfin"&&wfTab()}{tab==="saved"&&savedTab()}{tab==="settings"&&settingsTab()}</div>
    <div className="th-bottom-nav" style={{position:"fixed",bottom:0,left:0,right:0,background:T.bg,borderTop:`1px solid ${T.border}`,zIndex:50}}>
      <div style={{display:"flex",width:"100%",gap:2,padding:"6px 6px max(6px, env(safe-area-inset-bottom))"}}>
        {[{id:"generate",icon:"⚡",label:"Generate"},{id:"formats",icon:"📋",label:"Formats"},{id:"warmfin",icon:"🎯",label:"Games"},{id:"exercises",icon:"🏋️",label:"Exercises"},{id:"settings",icon:"⚙️",label:"Settings"}].map(t=>
          <button key={t.id} onClick={()=>setTab(t.id)} style={{flex:1,padding:"10px 12px 8px",background:tab===t.id?T.blueGlow:"none",border:tab===t.id?`1px solid ${T.blue}44`:"1px solid transparent",borderRadius:12,cursor:"pointer",color:tab===t.id?T.blue:T.textMuted,fontFamily:font,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:3,transition:"all .15s",minHeight:54}}>
            <span style={{fontSize:20,lineHeight:1}}>{t.icon}</span>
            <span style={{fontSize:10,fontWeight:tab===t.id?700:400}}>{t.label}</span>
          </button>
        )}
      </div>
    </div>
  </div>;
}try{ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));}catch(e){document.getElementById('error').style.display='block';document.getElementById('error').textContent='RENDER: '+e.message;}
</script>
<script>
var{useState,useMemo,useCallback,useRef,useEffect}=React;

</body>
